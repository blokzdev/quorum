name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Defense in depth: no job needs write scope (test/lint/build only). Fork PRs already get a read-only
# token, but pin it so a future step can't silently inherit write.
permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run test suite
        run: pytest -q

  smoke-install:
    name: clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fresh install (no dev extras) and import
        run: |
          python -m pip install --upgrade pip
          pip install .
          # Catches undeclared runtime deps (e.g. #994 python-dotenv): a bare
          # install must import the package and the CLI module.
          python -c "import tradingagents, cli.main; print('clean-install import OK')"

  lint:
    name: ruff (strict, full repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.15"
      - name: Lint the repository
        # The repo is fully clean under the strict select, so we lint everything
        # (results/ and worklog/ are excluded via pyproject extend-exclude).
        run: ruff check .

  flutter:
    name: flutter (analyze + test + goldens + build)
    # windows-latest is REQUIRED, not a preference: the 14 committed goldens were rasterized on Windows
    # and matchesGoldenFile is byte-exact (no tolerance). Pin the EXACT Flutter version the goldens were
    # generated on (3.38.6) — the Skia raster bytes are engine-version-baked, so a floating channel would
    # drift. flutter_test_config.dart loads the bundled fonts + MaterialIcons, so goldens don't depend on
    # host system fonts.
    runs-on: windows-latest
    timeout-minutes: 30 # fail fast if a hosted-image toolchain drift hangs the SDK/build step
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.6
          cache: true
      - run: flutter --version
      - name: quorum_core — pure-Dart tests
        working-directory: packages/quorum_core
        run: |
          dart pub get
          dart test
      - name: Desktop — deps
        working-directory: apps/desktop
        run: flutter pub get
      - name: Desktop — analyze
        working-directory: apps/desktop
        run: flutter analyze
      - name: Desktop — test (unit + widget + goldens)
        working-directory: apps/desktop
        run: flutter test
      - name: Upload golden failures (diagnose a first mismatch without a re-run)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: apps/desktop/test/golden/failures/
          if-no-files-found: ignore
      - name: Desktop — build windows (compile smoke; last so it never masks the test signal)
        working-directory: apps/desktop
        run: flutter build windows --debug
