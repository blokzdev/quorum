name: Packaging

# The full Windows installer build (P2.6b). NOT a per-PR gate — it's release-flavored (~6+ min:
# PyInstaller freeze + flutter --release + Inno Setup + optional self-signed sign). Runs on demand or on
# a version tag, and uploads the installer as an artifact. Production keystore signing is Phase 3.
on:
  workflow_dispatch:
    inputs:
      sign:
        description: "Sign with a debug self-signed cert"
        type: boolean
        default: false
  push:
    tags: ["v*"]

concurrency:
  group: packaging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  installer:
    name: build installer
    runs-on: windows-latest
    timeout-minutes: 45 # freeze + release build + Inno is ~6-10 min; cap so a hang fails fast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.6
          cache: true
      - name: Install engine (+ dev extras) and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build the installer
        shell: pwsh
        # `inputs.sign` is only set on workflow_dispatch; on a tag push it renders empty -> unsigned,
        # which is the intended default (a tag build shouldn't carry a debug self-signed cert).
        run: |
          if ("${{ github.event.inputs.sign }}" -eq "true") { .\packaging\build_installer.ps1 -Sign }
          else { .\packaging\build_installer.ps1 }
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: quorum-installer
          path: packaging/output/*.exe
          if-no-files-found: error

      # P4.3a clean-install smoke: prove the just-built installer lays down a working tree and the
      # frozen sidecar actually runs from the installed location (the true transitive-deps proof —
      # a demo/import check can't catch a broken freeze). GUI launch isn't testable headless, so we
      # run the installed sidecar directly and assert its public /healthz. Then uninstall cleanly.
      - name: Clean-install smoke — install → sidecar /healthz → uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $setup = (Get-ChildItem packaging/output/*.exe | Select-Object -First 1).FullName
          Write-Host "installing: $setup"
          Start-Process -FilePath $setup -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait
          $appDir = Join-Path $env:LOCALAPPDATA 'Programs\Quorum'
          foreach ($f in @('quorum.exe', 'sidecar\quorum_sidecar.exe',
                           'msvcp140.dll', 'vcruntime140.dll', 'vcruntime140_1.dll')) {
            if (-not (Test-Path (Join-Path $appDir $f))) { throw "install tree missing: $f" }
          }
          Write-Host "install tree OK ($appDir)"

          # Run the INSTALLED frozen sidecar on a fixed port; /healthz is public (no bearer).
          $port = 8756
          $env:QUORUM_PARENT_PID = "$PID"   # keep the watchdog alive while this step runs
          $env:QUORUM_API_PORT = "$port"
          $sc = Start-Process -FilePath (Join-Path $appDir 'sidecar\quorum_sidecar.exe') -PassThru -WindowStyle Hidden
          try {
            $ok = $false
            for ($i = 0; $i -lt 60; $i++) {   # up to ~30s for the frozen exe to boot + import langgraph etc.
              Start-Sleep -Milliseconds 500
              if ($sc.HasExited) { throw "sidecar exited early (code $($sc.ExitCode))" }
              try {
                $r = Invoke-RestMethod "http://127.0.0.1:$port/healthz" -TimeoutSec 2
                if ($r.status -eq 'ok') { $ok = $true; break }
              } catch { }
            }
            if (-not $ok) { throw "installed sidecar /healthz never returned ok on port $port" }
            Write-Host "frozen sidecar /healthz = ok"
          } finally {
            if ($sc -and -not $sc.HasExited) { Stop-Process -Id $sc.Id -Force }
          }

          # Uninstall (Inno's per-user unins000.exe) and confirm the tree is gone.
          $unins = Join-Path $appDir 'unins000.exe'
          if (-not (Test-Path $unins)) { throw "uninstaller missing: $unins" }
          Start-Process -FilePath $unins -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -Wait
          Start-Sleep -Seconds 2
          if (Test-Path (Join-Path $appDir 'quorum.exe')) { throw "uninstall failed: quorum.exe still present" }
          Write-Host "install -> healthz -> uninstall smoke PASSED"
