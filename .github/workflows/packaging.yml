name: Packaging

# The full Windows installer build (P2.6b). NOT a per-PR gate — it's release-flavored (~6+ min:
# PyInstaller freeze + flutter --release + Inno Setup + optional self-signed sign). Runs on demand or on
# a version tag, and uploads the installer as an artifact. Production keystore signing is Phase 3.
on:
  workflow_dispatch:
    inputs:
      sign:
        description: "Sign with a debug self-signed cert"
        type: boolean
        default: false
  push:
    tags: ["v*"]

concurrency:
  group: packaging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  installer:
    name: build installer
    runs-on: windows-latest
    timeout-minutes: 45 # freeze + release build + Inno is ~6-10 min; cap so a hang fails fast
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.6
          cache: true
      - name: Install engine (+ dev extras) and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build the installer
        shell: pwsh
        # `inputs.sign` is only set on workflow_dispatch; on a tag push it renders empty -> unsigned,
        # which is the intended default (a tag build shouldn't carry a debug self-signed cert).
        run: |
          if ("${{ github.event.inputs.sign }}" -eq "true") { .\packaging\build_installer.ps1 -Sign }
          else { .\packaging\build_installer.ps1 }
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: quorum-installer
          path: packaging/output/*.exe
          if-no-files-found: error
