name: secret-scan

# The secret-scan gate (Phase 4 P4.1a): fails the build if any credential is ever committed to this
# PUBLIC repo. A standalone workflow (not a job in ci.yml) so it's independently legible + can be a
# required status check on `main`, and so only IT pays the full-history checkout cost. gitleaks is
# free for public repos (no GITLEAKS_LICENSE needed). Config + allowlist: .gitleaks.toml.
on:
  push:
    branches: [main]
  pull_request:

# Read-only, mirroring ci.yml — the scanner never needs write scope.
permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history: a key committed then "removed" in an earlier commit is still a live leak
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # Default behavior exits non-zero on any finding — that non-zero IS the gate.
