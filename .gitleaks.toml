# Quorum gitleaks config — the secret-scan gate for a PUBLIC repo (Phase 4 P4.1a).
# Extends gitleaks' built-in ruleset (which already covers AIza… / sk-… / sk-ant-… / AKIA… /
# "BEGIN … PRIVATE KEY" blocks). Real secrets live only in the gitignored .env (verified
# never-committed); every key-looking string in the tree is a deliberate low-entropy test fixture.
#
# Allowlisting is BY VALUE, never by whole file/path: a directory path-allowlist would mask an entire
# tree, so a real key accidentally committed under tests/ (or anywhere) would slip past the gate. By
# pinning only the exact deliberate fake-key stems, a real credential is still caught EVERYWHERE —
# including inside test files and .env.example.
title = "Quorum gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Deliberate fake-key fixtures only, matched by value — never whole files."
regexes = [
  '''sk-SECRET-[A-Za-z0-9-]+''',                            # Dart golden/widget test fixtures
  '''SECRET-(?:alpha-vantage|fred|anthropic)-[0-9a-f]{4}''', # Python sidecar-test sentinel keys
]
